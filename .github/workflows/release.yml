name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MYTHOS_AUTO_UPDATE: '1'

jobs:
  determine-release:
    runs-on: ubuntu-latest
    outputs:
      is-beta: ${{ steps.check.outputs.is-beta }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine release type
        id: check
        run: |
          TAG="${{ github.ref }}"
          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" =~ ^v.*-beta ]]; then
            echo "is-beta=true" >> $GITHUB_OUTPUT
          else
            echo "is-beta=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

  build-windows:
    needs: determine-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Windows signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            exit 0
          }
          $certBytes = [Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE_BASE64")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $certBytes)
          echo "WIN_CSC_LINK=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

      - name: Build and publish (NSIS + ZIP)
        run: npm run dist
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist-electron/*.exe
            dist-electron/*.zip

  build-mac:
    needs: determine-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        # Gracefully skipped when the secret is absent — unsigned build continues.
        # Add APPLE_CERTIFICATE_BASE64 + APPLE_CERTIFICATE_PASSWORD secrets to
        # enable Developer ID signing (board action required to purchase cert).
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "No Apple Developer ID certificate configured; building unsigned (dev signing)."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          echo "APPLE_CERT_IMPORTED=1" >> "$GITHUB_ENV"
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and publish (macOS DMG + ZIP)
        shell: bash
        run: |
          # Use Developer ID identity from keychain when cert was imported;
          # otherwise fall back to ad-hoc (CSC_IDENTITY_AUTO_DISCOVERY=false).
          if [ "${APPLE_CERT_IMPORTED:-}" = "1" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run dist:mac:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization gate — set APPLE_NOTARIZE secret to '1' once Apple ID
          # credentials are available. build/notarize.js is a no-op otherwise.
          APPLE_NOTARIZE: ${{ secrets.APPLE_NOTARIZE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Linux AppImage + deb + rpm)
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm

  publish-release:
    needs: [determine-release, build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ needs.determine-release.outputs.version }}"
          PREV_TAG=$(git tag -l --sort=-version:refname --merged HEAD "v*" | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %h %s" | head -20)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --format="- %h %s")
          fi

          # Escape for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-release.outputs.version }}
          draft: false
          prerelease: ${{ needs.determine-release.outputs.is-beta == 'true' }}
          files: |
            windows-dist/**/*
            linux-dist/**/*
            macos-dist/**/*
          body: ${{ steps.changelog.outputs.notes }}
