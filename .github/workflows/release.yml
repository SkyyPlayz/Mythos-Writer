name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MYTHOS_AUTO_UPDATE: '1'

jobs:
  determine-release:
    runs-on: self-hosted
    outputs:
      is-beta: ${{ steps.check.outputs.is-beta }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine release type
        id: check
        run: |
          TAG="${{ github.ref }}"
          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" =~ ^v.*-beta ]]; then
            echo "is-beta=true" >> $GITHUB_OUTPUT
          else
            echo "is-beta=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

  # Windows build — cross-compiled from Linux via electron-builder + NSIS + Wine.
  # Unsigned builds (no cert secret) skip signing but still produce a working installer.
  build-windows:
    needs: determine-release
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Windows cross-build dependencies (NSIS + Wine)
        run: |
          # Skip apt-get if packages are already present on the runner (preferred setup).
          # To pre-install on the runner host: sudo apt-get install -y nsis wine wine32:i386
          HAS_NSIS=0; HAS_WINE=0
          command -v makensis >/dev/null 2>&1 && HAS_NSIS=1 || true
          command -v wine   >/dev/null 2>&1 && HAS_WINE=1 || true
          if [ "$HAS_NSIS" = "1" ] && [ "$HAS_WINE" = "1" ]; then
            echo "NSIS and Wine already installed — skipping apt-get."
            exit 0
          fi
          # Fall back to apt-get. Requires passwordless sudo (NOPASSWD) on the runner.
          # Use -n (non-interactive) so the step fails immediately with a clear error
          # rather than hanging waiting for a terminal/password.
          sudo -n apt-get update -qq || {
            echo "::error::sudo apt-get requires a terminal or NOPASSWD on this runner."
            echo "Pre-install with: sudo apt-get install -y nsis wine wine32:i386"
            echo "Or configure: echo 'skyy ALL=(ALL) NOPASSWD: /usr/bin/apt-get, /usr/bin/dpkg' | sudo tee /etc/sudoers.d/github-runner"
            exit 1
          }
          # NSIS (makensis) compiles the installer; Wine/rcedit embeds version info and icon.
          sudo -n apt-get install -y --no-install-recommends nsis || true
          sudo -n dpkg --add-architecture i386 2>/dev/null || true
          sudo -n apt-get update -qq || true
          sudo -n apt-get install -y --no-install-recommends wine wine32:i386 2>/dev/null || \
            sudo -n apt-get install -y --no-install-recommends wine64 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Decode Windows signing certificate
        shell: bash
        run: |
          if [ -z "${WINDOWS_CERTIFICATE_BASE64:-}" ]; then
            echo "No Windows signing certificate configured; building unsigned installer."
            exit 0
          fi
          echo "$WINDOWS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.pfx"
          echo "WIN_CSC_LINK=$RUNNER_TEMP/certificate.pfx" >> "$GITHUB_ENV"
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

      - name: Build Windows artifacts (NSIS + ZIP)
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: windows-dist
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          retention-days: 14

  # macOS build — optional; not a dependency of publish-release.
  # Runs on hosted macos-latest; will be skipped when Actions minutes are exhausted.
  # GH_TOKEN intentionally omitted; macOS publish is gated on signing.
  build-mac:
    needs: determine-release
    runs-on: macos-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        # Secret-gated: activates automatically when APPLE_CERT_P12_BASE64 is set.
        # Board action MYT-642 provisions the secret; no code change required then.
        # When absent the step logs clearly and the build continues unsigned.
        shell: bash
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "APPLE_CERT_P12_BASE64 not set — building unsigned DMG (Gatekeeper warning expected)."
            echo "Add Apple Developer ID secrets (see MYT-642) to enable signing + notarization."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          echo "APPLE_CERT_IMPORTED=1" >> "$GITHUB_ENV"
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Build macOS artifacts (DMG + ZIP)
        shell: bash
        run: |
          # Use Developer ID identity from keychain when cert was imported;
          # otherwise fall back to ad-hoc signing (unsigned DMG, Gatekeeper warning).
          if [ "${APPLE_CERT_IMPORTED:-}" = "1" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run dist:mac:release
        env:
          # Notarization is handled by build/notarize.js (afterSign hook).
          # It activates automatically when APPLE_CERT_P12_BASE64 is set above.
          # Supports both app-specific-password auth (APPLE_APP_PASSWORD) and
          # API-key auth (APPLE_API_KEY_PATH + APPLE_API_KEY_ID + APPLE_API_ISSUER_ID).
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: macos-dist
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          retention-days: 14

  build-linux:
    needs: [determine-release]
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage — stable channel
        if: needs.determine-release.outputs.is-beta == 'false'
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish never

      - name: Build Linux AppImage — beta channel
        if: needs.determine-release.outputs.is-beta == 'true'
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish never --config.publish.channel=beta

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: linux-dist
          path: |
            dist-electron/*.AppImage
            dist-electron/*.yml
          retention-days: 14

  publish-release:
    needs: [determine-release, build-linux, build-windows]
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: linux-dist

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: windows-dist

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ needs.determine-release.outputs.version }}"
          PREV_TAG=$(git tag -l --sort=-version:refname --merged HEAD "v*" | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %h %s" | head -20)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --format="- %h %s")
          fi

          # Escape for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-release.outputs.version }}
          draft: true
          prerelease: ${{ needs.determine-release.outputs.is-beta == 'true' }}
          files: |
            linux-dist/**/*
            windows-dist/**/*
          body: ${{ steps.changelog.outputs.notes }}
