name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MYTHOS_AUTO_UPDATE: '1'

jobs:
  determine-release:
    runs-on: ubuntu-latest
    outputs:
      is-beta: ${{ steps.check.outputs.is-beta }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine release type
        id: check
        run: |
          TAG="${{ github.ref }}"
          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" =~ ^v.*-beta ]]; then
            echo "is-beta=true" >> $GITHUB_OUTPUT
          else
            echo "is-beta=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

  build-windows:
    needs: determine-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Windows signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            exit 0
          }
          $certBytes = [Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE_BASE64")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $certBytes)
          echo "WIN_CSC_LINK=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

      - name: Build and publish (NSIS + ZIP)
        run: npm run dist
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist-electron/*.exe
            dist-electron/*.zip

  # Stubbed pending code signing setup (Phase 4)
  build-mac:
    if: false
    runs-on: macos-latest
    steps:
      - run: echo "Mac build pending code signing setup (Phase 4)"

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Linux AppImage + deb + rpm)
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm

  publish-release:
    needs: [determine-release, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ needs.determine-release.outputs.version }}"
          PREV_TAG=$(git tag -l --sort=-version:refname --merged HEAD "v*" | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %h %s" | head -20)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --format="- %h %s")
          fi

          # Escape for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-release.outputs.version }}
          draft: false
          prerelease: ${{ needs.determine-release.outputs.is-beta == 'true' }}
          files: |
            windows-dist/**/*
            linux-dist/**/*
          body: ${{ steps.changelog.outputs.notes }}
