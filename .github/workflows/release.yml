name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0-beta.2)'
        required: true
      is-beta:
        description: 'Mark as beta pre-release'
        type: boolean
        default: false

env:
  MYTHOS_AUTO_UPDATE: '1'

jobs:
  determine-release:
    runs-on: ubuntu-latest
    outputs:
      is-beta: ${{ steps.check.outputs.is-beta }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine release type
        id: check
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref }}"
            TAG="${TAG#refs/tags/}"
          fi
          if [[ "$TAG" =~ ^v.*-beta ]] || [ "${{ inputs.is-beta }}" = "true" ]; then
            echo "is-beta=true" >> $GITHUB_OUTPUT
          else
            echo "is-beta=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

  # Create the draft release so build jobs can upload directly to it.
  # Uses softprops/action-gh-release which handles create-or-update idempotently.
  create-release:
    needs: determine-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-release.outputs.version }}
          draft: true
          prerelease: ${{ needs.determine-release.outputs.is-beta == 'true' }}
          body: "Release build in progress…"

  # Windows build — native on hosted windows-latest (electron-builder bundles its
  # own NSIS on Windows; no wine cross-compile needed since the repo went public).
  build-windows:
    needs: [determine-release, create-release]
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Windows signing certificate
        shell: bash
        run: |
          if [ -z "${WINDOWS_CERTIFICATE_BASE64:-}" ]; then
            echo "No Windows signing certificate configured; building unsigned installer."
            exit 0
          fi
          echo "$WINDOWS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.pfx"
          echo "WIN_CSC_LINK=$RUNNER_TEMP/certificate.pfx" >> "$GITHUB_ENV"
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

      - name: Build Windows artifacts — stable channel (NSIS + ZIP)
        if: needs.determine-release.outputs.is-beta == 'false'
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build Windows artifacts — beta channel (NSIS + ZIP)
        if: needs.determine-release.outputs.is-beta == 'true'
        # releaseType=prerelease: bakes correct value into app-update.yml so the updater
        # searches GitHub pre-releases (where beta cuts land) via the beta.yml feed.
        run: npx electron-vite build && npx electron-builder --win --publish never --config.publish.channel=beta --config.publish.releaseType=prerelease
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload Windows artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.determine-release.outputs.version }}
        run: |
          gh release upload "$TAG" dist-electron/*.exe dist-electron/*.zip dist-electron/*.yml --clobber

  # macOS build — optional; not a dependency of publish-release.
  # DISABLED 2026-07-14 (Skyy): Actions budget is reserved for releases the owner can
  # actually install; macOS is a deferred platform (no Mac) and macos-latest bills at
  # 10x Linux. The old "will be skipped when minutes are exhausted" assumption stopped
  # holding once the budget was topped up — it would now really run and really bill.
  # To re-enable when macOS ships, delete the `if: false` line below.
  build-mac:
    if: false
    needs: [determine-release, create-release]
    runs-on: macos-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        # Secret-gated: activates automatically when APPLE_CERT_P12_BASE64 is set.
        # Board action MYT-642 provisions the secret; no code change required then.
        # When absent the step logs clearly and the build continues unsigned.
        shell: bash
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "APPLE_CERT_P12_BASE64 not set — building unsigned DMG (Gatekeeper warning expected)."
            echo "Add Apple Developer ID secrets (see MYT-642) to enable signing + notarization."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          echo "APPLE_CERT_IMPORTED=1" >> "$GITHUB_ENV"
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Build macOS artifacts (DMG + ZIP)
        shell: bash
        run: |
          # Use Developer ID identity from keychain when cert was imported;
          # otherwise fall back to ad-hoc signing (unsigned DMG, Gatekeeper warning).
          if [ "${APPLE_CERT_IMPORTED:-}" = "1" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          if [ "${{ needs.determine-release.outputs.is-beta }}" = "true" ]; then
            # releaseType=prerelease: bakes correct value into app-update.yml so the updater
            # searches GitHub pre-releases (where beta cuts land) via the beta-mac.yml feed.
            npx electron-vite build && npx electron-builder --mac dmg zip --publish never --config.publish.channel=beta --config.publish.releaseType=prerelease
          else
            npx electron-vite build && npx electron-builder --mac dmg zip --publish never
          fi
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Upload macOS artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.determine-release.outputs.version }}
        run: |
          gh release upload "$TAG" dist-electron/*.dmg dist-electron/*.zip dist-electron/*.yml --clobber

  build-linux:
    needs: [determine-release, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage — stable channel
        # Clear LD_LIBRARY_PATH so the runner's inherited Paperclip embedded-postgres lib path
        # does not shadow the system liblzma.so.5 and break xz/tar during AppImage packaging.
        if: needs.determine-release.outputs.is-beta == 'false'
        env:
          LD_LIBRARY_PATH: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish never

      - name: Build Linux AppImage — beta channel
        if: needs.determine-release.outputs.is-beta == 'true'
        # releaseType=prerelease: bakes correct value into app-update.yml so the updater
        # searches GitHub pre-releases (where beta cuts land) via the beta-linux.yml feed.
        env:
          LD_LIBRARY_PATH: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish never --config.publish.channel=beta --config.publish.releaseType=prerelease

      - name: Upload Linux artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.determine-release.outputs.version }}
        run: |
          gh release upload "$TAG" dist-electron/*.AppImage dist-electron/*.yml --clobber

  publish-release:
    needs: [determine-release, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ needs.determine-release.outputs.version }}"
          PREV_TAG=$(git tag -l --sort=-version:refname --merged HEAD "v*" | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %h %s" | head -20)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --format="- %h %s")
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SKY-8110: publish (undraft) once all artifacts are uploaded. Draft releases
      # are invisible to electron-updater, so keeping releases as drafts stranded
      # every installed build with no update path. Betas stay marked prerelease
      # (set at create-release), which keeps them off the stable `latest` channel.
      - name: Publish release with notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.determine-release.outputs.version }}
        run: |
          if [ "${{ needs.determine-release.outputs.is-beta }}" = "true" ]; then
            gh release edit "$TAG" --notes "${{ steps.changelog.outputs.notes }}" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --notes "${{ steps.changelog.outputs.notes }}" --draft=false
          fi
