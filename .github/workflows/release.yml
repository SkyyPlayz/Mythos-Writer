name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Windows signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            exit 0
          }
          $certBytes = [Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE_BASE64")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $certBytes)
          echo "WIN_CSC_LINK=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

      - name: Build and publish (NSIS + ZIP)
        run: npm run dist
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MYTHOS_AUTO_UPDATE: '1'

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-electron/*.zip

  # Stubbed pending code signing setup (Phase 4)
  build-mac:
    if: false
    runs-on: macos-latest
    steps:
      - run: echo "Mac build pending code signing setup (Phase 4)"

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Linux AppImage + deb + rpm)
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MYTHOS_AUTO_UPDATE: '1'

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/*.AppImage

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist-electron/*.deb

      - name: Upload Linux rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist-electron/*.rpm
