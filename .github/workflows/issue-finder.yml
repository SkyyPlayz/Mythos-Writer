name: Issue Finder
# Files deduplicated `auto-found` issues for Fuzz workflow failures (SKY-7774).
# CI failures are deliberately not scanned: they are already routed by
# GitHubManager and the daily GitHub sync sweep (SKY-7725).

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log create/comment decisions without writing to GitHub"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  find-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Find and create issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '' }}
        run: node .github/scripts/issue-finder.js
