name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      # SKY-361: coverage-guided fuzz run on every PR — 60 s per harness.
      # Fuzzes parseFrontmatter (Obsidian import path) and the DOCX/EPUB inline
      # parsers. Crashes are uploaded as artifacts so triage can start immediately.
      # See docs/security/fuzz-triage-runbook.md for what to do when this fails.
      - name: Fuzz — build harnesses (TypeScript → JS)
        run: |
          rm -rf electron-main/fuzz/dist/
          npm run fuzz:build -w electron-main

      - name: Fuzz — frontmatter parser (60 s)
        run: |
          mkdir -p electron-main/fuzz/crashes
          cd electron-main && npx jazzer fuzz/dist/fuzz/frontmatter.fuzz.js fuzz/corpus/frontmatter --sync -- -max_total_time=60 -artifact_prefix=fuzz/crashes/frontmatter-

      - name: Fuzz — DOCX/EPUB inline parsers (60 s)
        run: |
          mkdir -p electron-main/fuzz/crashes
          cd electron-main && npx jazzer fuzz/dist/fuzz/docxInline.fuzz.js fuzz/corpus/docxInline -- -max_total_time=60 -artifact_prefix=fuzz/crashes/docxInline-

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: electron-main/fuzz/crashes/
          retention-days: 30

      - name: Build (electron-vite)
        run: npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get (avoids sudo on self-hosted runner)"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: E2E — vault CRUD (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:crud

      - name: E2E — Brainstorm Agent streaming and vault note creation (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:brainstorm

      - name: e2e visual-capture (MYT-531 §9.2/§9.3)
        run: xvfb-run --auto-servernum npm run test:e2e:visual-capture

      - name: Upload visual-capture artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-capture-artifacts
          path: e2e-visual-artifacts/visual-capture/
          retention-days: 7

      - name: E2E — Writing modes UI keyboard switch + chrome shift (MYT-768)
        run: xvfb-run --auto-servernum npm run test:e2e:writing-modes

      - name: E2E — Two-vault layout Story + Notes CRUD (MYT-769)
        run: xvfb-run --auto-servernum npm run test:e2e:two-vault

      - name: E2E — Versioned drafts snapshot + history + rollback (MYT-770)
        run: xvfb-run --auto-servernum npm run test:e2e:versioned-drafts

      - name: E2E — Visual regression baseline comparison (MYT-771)
        run: xvfb-run --auto-servernum npm run test:e2e:visual-regression

      - name: Upload visual-regression diffs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: e2e-visual-artifacts/visual-regression/
          retention-days: 7

      - name: E2E — A11y tab-focus audit VaultBrowser (SKY-143)
        run: xvfb-run --auto-servernum npm run test:e2e:a11y

      - name: E2E — Entity system regression create/alias/browse (SKY-220)
        run: xvfb-run --auto-servernum npm run test:e2e:entity

      - name: E2E — Entity creation edge cases (SKY-619)
        run: xvfb-run --auto-servernum npm run test:e2e:entity-creation

      - name: E2E — Vault Graph View Liquid Neon styling (SKY-217)
        run: xvfb-run --auto-servernum npm run test:e2e:vault-graph

      - name: E2E — Entity @-mention autocomplete (SKY-616)
        run: xvfb-run --auto-servernum npm run test:e2e:entity-mention

      - name: E2E — Timeline subway view (SKY-514)
        run: xvfb-run --auto-servernum npm run test:e2e:timeline

      - name: Upload E2E report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report/
          retention-days: 7

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package (macOS DMG)
        run: npm run dist:mac

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Guard — PERSIST_PROMPTS must not be set for release builds
        run: |
          if [ "${PERSIST_PROMPTS:-}" = "1" ]; then
            echo "ERROR: PERSIST_PROMPTS=1 is set in the environment. This flag stores full prompt text in cleartext and must never be enabled in a release build. Unset it before packaging." >&2
            exit 1
          fi
          for env_file in .env .env.production .env.local; do
            if [ -f "$env_file" ] && grep -qE '^PERSIST_PROMPTS=1' "$env_file"; then
              echo "ERROR: PERSIST_PROMPTS=1 found in $env_file. This flag stores full prompt text in cleartext and must never be included in a release build. Remove or comment it out before packaging." >&2
              exit 1
            fi
          done
          echo "Guard passed: PERSIST_PROMPTS is not set."

      - name: Build and package (Linux)
        run: npm run dist:linux

      - name: Verify .deb artifact
        run: |
          DEB=$(ls dist-electron/*.deb | head -1)
          echo "Verifying .deb: $DEB"
          dpkg-deb --info "$DEB"

      - name: Verify .rpm artifact
        run: |
          RPM=$(ls dist-electron/*.rpm | head -1)
          echo "Verifying .rpm: $RPM"
          file "$RPM"
          file "$RPM" | grep -qi 'rpm' || { echo "ERROR: file(1) did not identify $RPM as an RPM package"; exit 1; }

      - name: Smoke-test AppImage (start / stop)
        # APPIMAGE_EXTRACT_AND_RUN=1 extracts to a temp dir instead of mounting via
        # FUSE, so libfuse2 does not need to be installed on the self-hosted runner.
        run: |
          APPIMAGE=$(ls dist-electron/*.AppImage | head -1)
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run --auto-servernum "$APPIMAGE" --no-sandbox &
          APP_PID=$!
          sleep 8
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "AppImage exited prematurely — smoke test FAILED"
            exit 1
          fi
          kill "$APP_PID"
          wait "$APP_PID" || true
          echo "Smoke test passed: AppImage started and stopped cleanly"

      - name: Upload Linux packages
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
          retention-days: 7
