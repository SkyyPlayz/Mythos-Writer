name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || format('ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main') }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Runs first and populates the Actions npm cache (keyed on package-lock.json) so
  # the parallel downstream jobs get cache hits instead of each doing a cold
  # registry install on their fresh hosted VMs. (Replaces the SKY-4970 self-hosted
  # WSL2 serialization; hosted runners are ephemeral, so downstream jobs restore
  # the shared cache instead of relying on a warm local ~/.npm.)
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  lint:
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # SKY-1809: reject any tracked filename containing Windows-illegal characters
      # (\, <, >, :, ", |, ?, *) so build-windows can always check out the repo.
      - name: Guard — no Windows-illegal filenames in repo
        run: |
          if git ls-files | grep -Pq '[\\<>:"|?*]'; then
            echo 'ERROR: tracked filenames contain Windows-illegal characters (one of: \ < > : " | ? *):'
            git ls-files | grep -P '[\\<>:"|?*]'
            exit 1
          fi
          echo "Guard passed: no Windows-illegal filenames tracked."

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

  typecheck:
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

  unit:
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage (electron-main)
        run: npm run test -w electron-main -- --coverage

      - name: Test with coverage (frontend)
        run: npm run test -w frontend -- --coverage

      - name: Upload coverage report
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            electron-main/coverage/
            frontend/coverage/
          retention-days: 3

  build-electron:
    # SKY-2425: fuzz steps removed from this job — they were causing OOM-induced
    # runner disconnects on the DOCX/EPUB step (step 8), which cancelled the whole
    # job and prevented all 4 e2e shards from running. Fuzz coverage is retained
    # via fuzz.yml (runs on every PR as a separate non-blocking check).
    needs: [lint, typecheck, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: WSL2 power keep-alive — prevent Windows host sleep
        # SKY-2427: GabesPC (WSL2 host) sleeps under default Windows power settings during
        # this ~90-min job. SetThreadExecutionState prevents sleep without admin rights.
        # Sentinel file ($TEMP/mythos-ci-keepalive.active) signals the background PS process
        # to exit cleanly. No-op on non-WSL2 runners.
        run: |
          if ! grep -qi microsoft /proc/version 2>/dev/null; then
            echo "Not WSL2 — sleep prevention skipped."; exit 0
          fi
          PS=/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe
          if [ ! -x "$PS" ]; then
            echo "powershell.exe not accessible — sleep prevention skipped."; exit 0
          fi
          "$PS" -NonInteractive -ExecutionPolicy Bypass \
            -File "$(wslpath -w "$(pwd)/scripts/ci-power-keepalive.ps1")" &
          echo "WSL2 sleep prevention started."

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        # SKY-4207: clean out/ before building — it is gitignored and persists across
        # runs on self-hosted runners; stale hashed renderer chunks accumulate and
        # inflated the artifact to 1.4 GB on run 28113426547.
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          rm -rf out/
          npm run build:electron

      - name: Cache electron build for E2E shards
        # SKY-3872/SKY-4216: switched back to cache/save (separate 10 GB LRU quota)
        # after upload-artifact hit artifact storage quota on run 28113426547.
        # E2E shards fall back to a local rebuild on cache miss (SKY-3742).
        uses: actions/cache/save@v4
        with:
          path: out/
          key: electron-build-${{ github.run_id }}

      - name: Stop WSL2 power keep-alive
        if: always()
        run: |
          if ! grep -qi microsoft /proc/version 2>/dev/null; then exit 0; fi
          PS=/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe
          [ -x "$PS" ] || exit 0
          "$PS" -NonInteractive -ExecutionPolicy Bypass \
            -File "$(wslpath -w "$(pwd)/scripts/ci-power-keepalive.ps1")" -Stop 2>/dev/null || true
          echo "WSL2 sleep prevention stopped."

  e2e-shard-1:
    # Shard 1: crud, brainstorm, visual-capture, writing-modes, depth-slider, a11y
    needs: [build-electron]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore electron build from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: out/
          key: electron-build-${{ github.run_id }}

      - name: Rebuild electron if cache miss
        # SKY-3742/SKY-3872: fallback rebuild when the cache key was evicted under
        # load. Avoids fail-on-cache-miss hard-fail while always supplying a build.
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: rm -rf out/ && npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get (avoids sudo on self-hosted runner)"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: E2E — vault CRUD (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:crud

      - name: E2E — draft version history snapshot and rollback (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:draft-history

      - name: E2E — Brainstorm Agent streaming and vault note creation (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:brainstorm

      - name: E2E — ExportDialog formats DOCX/EPUB/Markdown (SKY-2213)
        run: xvfb-run --auto-servernum npm run test:e2e:export

      - name: e2e visual-capture (MYT-531 §9.2/§9.3)
        run: xvfb-run --auto-servernum npm run test:e2e:visual-capture

      - name: Upload visual-capture artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-capture-artifacts
          path: e2e-visual-artifacts/visual-capture/
          retention-days: 1

      - name: E2E — Writing modes UI keyboard switch + chrome shift (MYT-768)
        run: xvfb-run --auto-servernum npm run test:e2e:writing-modes

      - name: E2E — Depth slider + scene navigator (SKY-2441)
        run: xvfb-run --auto-servernum npm run test:e2e:depth-slider

      - name: E2E — A11y tab-focus audit VaultBrowser (SKY-143)
        run: xvfb-run --auto-servernum npm run test:e2e:a11y

      - name: E2E — Settings background image persistence (SKY-3219)
        run: xvfb-run --auto-servernum npm run test:e2e:settings-background

      - name: Upload E2E report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-shard-1
          path: e2e-report/
          retention-days: 3

  e2e-shard-2:
    # Shard 2: writing-assistant-tips, two-vault, versioned-drafts, entity, title-bar-undo-redo, mythos-migration
    needs: [build-electron]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore electron build from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: out/
          key: electron-build-${{ github.run_id }}

      - name: Rebuild electron if cache miss
        # SKY-3742/SKY-3872: fallback rebuild when the cache key was evicted under
        # load. Avoids fail-on-cache-miss hard-fail while always supplying a build.
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: rm -rf out/ && npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get (avoids sudo on self-hosted runner)"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: E2E — Writing Assistant tip card panel scan + note/ignore (SKY-1618)
        run: xvfb-run --auto-servernum npm run test:e2e:writing-assistant-tips

      - name: E2E — Two-vault layout Story + Notes CRUD (MYT-769)
        run: xvfb-run --auto-servernum npm run test:e2e:two-vault

      - name: E2E — Versioned drafts snapshot + history + rollback (MYT-770)
        run: xvfb-run --auto-servernum npm run test:e2e:versioned-drafts

      - name: E2E — Entity system regression create/alias/browse (SKY-220)
        run: xvfb-run --auto-servernum npm run test:e2e:entity

      - name: E2E — Title bar Edit -> Undo/Redo wired to focused editor (SKY-6059)
        run: xvfb-run --auto-servernum npm run test:e2e:title-bar-undo-redo

      - name: "E2E — MythosVault migration wizard TC-MV-01..03 (Beta 4 M5, #912)"
        run: xvfb-run --auto-servernum npm run test:e2e:mythos-migration

      - name: E2E — Comments v2 gutter + vault-copy round-trip (Beta 4 M9)
        run: xvfb-run --auto-servernum npm run test:e2e:comments

      - name: Upload E2E report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-shard-2
          path: e2e-report/
          retention-days: 3

  e2e-shard-3:
    # Shard 3: visual-regression, entity-creation, vault-graph, vault-graph-v0, wiki-link-autocomplete, auto-update (guarded)
    needs: [build-electron]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore electron build from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: out/
          key: electron-build-${{ github.run_id }}

      - name: Rebuild electron if cache miss
        # SKY-3742/SKY-3872: fallback rebuild when the cache key was evicted under
        # load. Avoids fail-on-cache-miss hard-fail while always supplying a build.
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: rm -rf out/ && npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get (avoids sudo on self-hosted runner)"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: E2E — Visual regression baseline comparison (MYT-771)
        run: xvfb-run --auto-servernum npm run test:e2e:visual-regression
        env:
          # M16 notes-explorer toolbar shifts brainstorm-chat and settings-panel
          # by ~0.6%; raise threshold to 0.7% so intentional UI changes don't
          # block CI. Reset to 0.5% once baselines are refreshed on a CI runner.
          VR_THRESHOLD: "0.007"

      - name: Upload visual-regression diffs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: e2e-visual-artifacts/visual-regression/
          retention-days: 3

      - name: E2E — Entity creation edge cases (SKY-619)
        run: xvfb-run --auto-servernum npm run test:e2e:entity-creation

      - name: E2E — Vault Graph View Liquid Neon styling (SKY-217)
        run: xvfb-run --auto-servernum npm run test:e2e:vault-graph

      - name: E2E — Vault Graph v0 AC-GV-01..12 (SKY-1767)
        run: xvfb-run --auto-servernum npm run test:e2e:vault-graph-v0

      - name: E2E — Wiki-link autocomplete popup (SKY-5702 / GH#650 WL-1)
        run: xvfb-run --auto-servernum npm run test:e2e:wiki-link-autocomplete

      - name: E2E — Auto-update on beta channel (SKY-3223, guarded — deferred feature)
        # Requires MYTHOS_AUTO_UPDATE_E2E=1, a packaged build, and a live beta
        # update feed; none exist in CI, so this spec self-skips (test.skip)
        # here and just proves it collects cleanly. Un-skip once auto-update
        # is un-deferred and a real feed exists to test against.
        run: xvfb-run --auto-servernum npm run test:e2e:auto-update

      - name: Upload E2E report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-shard-3
          path: e2e-report/
          retention-days: 3

  e2e-shard-4:
    # Shard 4: entity-mention, timeline, entries, post-onboarding, continuity-panel, scene-crafter
    needs: [build-electron]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore electron build from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: out/
          key: electron-build-${{ github.run_id }}

      - name: Rebuild electron if cache miss
        # SKY-3742/SKY-3872: fallback rebuild when the cache key was evicted under
        # load. Avoids fail-on-cache-miss hard-fail while always supplying a build.
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: rm -rf out/ && npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get (avoids sudo on self-hosted runner)"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: E2E — Entity @-mention autocomplete (SKY-616)
        run: xvfb-run --auto-servernum npm run test:e2e:entity-mention

      - name: E2E — Timeline subway view (SKY-514)
        run: xvfb-run --auto-servernum npm run test:e2e:timeline

      - name: E2E — Entries quick-capture create and promote-to-note (SKY-898)
        run: xvfb-run --auto-servernum npm run test:e2e:entries

      - name: E2E — Post-onboarding polish panel, scene hint, template CTA (SKY-1188)
        run: xvfb-run --auto-servernum npm run test:e2e:post-onboarding

      - name: E2E — Archive continuity panel + inconsistency flow (SKY-1742)
        run: xvfb-run --auto-servernum npm run test:e2e:continuity-panel

      - name: E2E — Scene Crafter Kanban AC-SC-01 through AC-SC-14 (SKY-1766)
        run: xvfb-run --auto-servernum npm run test:e2e:scene-crafter

      - name: E2E — Onboarding v2 AC-OB-01..16 (SKY-2009)
        run: xvfb-run --auto-servernum npm run test:e2e:onboarding-v2

      - name: E2E — Writing Assistant panel AC-WA-01..27 (SKY-2633)
        run: xvfb-run --auto-servernum npm run test:e2e:writing-assistant

      - name: E2E — Outline planning surface AC-OPL-QA-01..09 (SKY-3028)
        run: xvfb-run --auto-servernum npm run test:e2e:outline

      - name: Upload E2E report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-shard-4
          path: e2e-report/
          retention-days: 3

  ci:
    # Required check aggregator — always runs (if: always()) so branch protection
    # gets a definitive pass/fail rather than a "pending" indefinite skipped state
    # when Stage 1 (lint/typecheck/unit) fails and downstream jobs are skipped.
    # Explicit outcome check ensures any failure or skip in upstream jobs → failure here.
    needs: [lint, typecheck, unit, e2e-shard-1, e2e-shard-2, e2e-shard-3, e2e-shard-4]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5

    steps:
      - name: All checks passed
        run: |
          results="${{ needs.lint.result }} ${{ needs.typecheck.result }} ${{ needs.unit.result }} ${{ needs.e2e-shard-1.result }} ${{ needs.e2e-shard-2.result }} ${{ needs.e2e-shard-3.result }} ${{ needs.e2e-shard-4.result }}"
          echo "Upstream results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "Required job outcome '$r' — expected 'success'. CI aggregator: FAILED."
              exit 1
            fi
          done
          echo "All checks passed — lint, typecheck, unit, and all 4 E2E shards are green."

  build-macos:
    # macOS is a DEFERRED platform (owner has no Mac; included-minutes-only).
    # DISABLED 2026-07-14 (Skyy): "pause/disable the macos ci for now" — the Actions
    # budget is reserved for releases only. macos-latest bills at 10x Linux.
    # To re-enable when the mac build is back on the roadmap, restore:
    #   if: github.event_name == 'workflow_dispatch'
    # The `ci` aggregator does not depend on this job, so disabling cannot block a PR.
    if: false
    # macOS build: GitHub-hosted runner (required for macOS; no self-hosted macOS available).
    # Validates macOS Electron build and runs core E2E tests on native macOS.
    # Unsigned DMG is acceptable for PR CI (signing only needed for release builds).
    needs: [lint, typecheck, unit]
    runs-on: macos-latest
    timeout-minutes: 40
    continue-on-error: false

    steps:
      - uses: actions/checkout@v4

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (DMG, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx electron-vite build && npx electron-builder --mac dmg --publish never

      - name: Verify .dmg artifact exists
        run: |
          DMG=$(ls dist-electron/*.dmg | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No .dmg artifact found after build"
            exit 1
          fi
          echo "macOS DMG built: $DMG"
          ls -lh "$DMG"

      - name: Upload macOS build artifacts (PR debug)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist-electron/*.dmg
          retention-days: 1

  build-linux:
    # SKY-2421: job-level `if` was causing `skipped` status on PRs, which caused
    # the `report` job (needs: [..., build-linux, ...]) to also be skipped despite
    # `if: always()` — a known GH Actions quirk with multiple skipped upstream jobs.
    # Fix: always run the job; gate packaging steps at step level so PRs fast-exit
    # with `success` and push/workflow_dispatch does the full packaging.
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: build-linux-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip — packaging only runs on push/workflow_dispatch
        if: github.event_name == 'pull_request'
        run: |
          echo "build-linux: packaging skipped on pull_request events."
          echo "Required check satisfied — packaging runs on push to main or workflow_dispatch only."

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request'

      - name: WSL2 power keep-alive — prevent Windows host sleep
        # SKY-2427: same sleep-prevention guard as the ci job (40-min build also at risk).
        run: |
          if ! grep -qi microsoft /proc/version 2>/dev/null; then
            echo "Not WSL2 — sleep prevention skipped."; exit 0
          fi
          PS=/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe
          if [ ! -x "$PS" ]; then
            echo "powershell.exe not accessible — sleep prevention skipped."; exit 0
          fi
          "$PS" -NonInteractive -ExecutionPolicy Bypass \
            -File "$(wslpath -w "$(pwd)/scripts/ci-power-keepalive.ps1")" &
          echo "WSL2 sleep prevention started."

      - name: Pre-flight — clean stale AppImage temp dirs (SKY-1347)
        # APPIMAGE_EXTRACT_AND_RUN=1 in the smoke-test step leaves /tmp/appimage_extracted_*
        # dirs (~307 MB each) that accumulate across CI runs on the self-hosted runner and
        # fill the 24 GB tmpfs, causing fpm ENOSPC during deb packaging. This sweep reclaims
        # space from any prior run's leftovers before we start the build.
        if: github.event_name != 'pull_request'
        run: find /tmp -maxdepth 1 -name 'appimage_extracted_*' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name != 'pull_request'
        run: npm ci

      - name: Guard — PERSIST_PROMPTS must not be set for release builds
        if: github.event_name != 'pull_request'
        run: |
          if [ "${PERSIST_PROMPTS:-}" = "1" ]; then
            echo "ERROR: PERSIST_PROMPTS=1 is set in the environment. This flag stores full prompt text in cleartext and must never be enabled in a release build. Unset it before packaging." >&2
            exit 1
          fi
          for env_file in .env .env.production .env.local; do
            if [ -f "$env_file" ] && grep -qE '^PERSIST_PROMPTS=1' "$env_file"; then
              echo "ERROR: PERSIST_PROMPTS=1 found in $env_file. This flag stores full prompt text in cleartext and must never be included in a release build. Remove or comment it out before packaging." >&2
              exit 1
            fi
          done
          echo "Guard passed: PERSIST_PROMPTS is not set."

      - name: Free disk space before packaging
        # SKY-1334: runner accumulates linux-unpacked staging dirs and /tmp electron-builder
        # scratch trees from prior runs; purge them before the deb/AppImage build to avoid ENOSPC.
        if: github.event_name != 'pull_request'
        run: |
          echo "=== Disk before cleanup ===" && df -h .
          find ~/.cache/electron-builder -mindepth 2 -maxdepth 3 \
            \( -name 'linux-unpacked' -o -name '*.deb' -o -name '*.AppImage' \) \
            -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -name 'electron-builder-*' -type d -exec rm -rf {} + 2>/dev/null || true
          echo "=== Disk after cleanup ===" && df -h .

      - name: Build and package (Linux AppImage + deb)
        # deb packaging is in electron-builder.json for release builds; CI validates AppImage + deb.
        # Skip rpm target: rpmbuild and fpm not fully provisioned on GabesPC yet.
        # Clear LD_LIBRARY_PATH so the runner's inherited Paperclip embedded-postgres lib path
        # does not shadow the system liblzma.so.5 and break xz/tar/dpkg-deb during packaging.
        if: github.event_name != 'pull_request'
        env:
          LD_LIBRARY_PATH: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build:electron && npx electron-builder --linux AppImage deb --publish never

      - name: Verify .deb artifact
        # dpkg-deb also loads liblzma, so clear LD_LIBRARY_PATH here too.
        if: github.event_name != 'pull_request'
        env:
          LD_LIBRARY_PATH: ""
        run: |
          DEB=$(ls dist-electron/*.deb | head -1)
          echo "Verifying .deb: $DEB"
          dpkg-deb --info "$DEB"

      - name: Install Xvfb (virtual display for AppImage smoke test)
        if: github.event_name != 'pull_request'
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: Smoke-test AppImage (start / stop)
        # APPIMAGE_EXTRACT_AND_RUN=1 extracts to a temp dir instead of mounting via
        # FUSE, so libfuse2 does not need to be installed on the runner.
        if: github.event_name != 'pull_request'
        run: |
          APPIMAGE=$(ls dist-electron/*.AppImage | head -1)
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run --auto-servernum "$APPIMAGE" --no-sandbox &
          APP_PID=$!
          sleep 8
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "AppImage exited prematurely — smoke test FAILED"
            exit 1
          fi
          kill "$APP_PID"
          wait "$APP_PID" || true
          echo "Smoke test passed: AppImage started and stopped cleanly"

      - name: Clean AppImage temp dirs after smoke test
        # Remove the extracted AppImage dir created by APPIMAGE_EXTRACT_AND_RUN=1.
        # Runs even on failure so partial extractions don't accumulate.
        if: always() && github.event_name != 'pull_request'
        run: find /tmp -maxdepth 1 -name 'appimage_extracted_*' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Upload Linux packages
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          retention-days: 3

      - name: Stop WSL2 power keep-alive
        if: always()
        run: |
          if ! grep -qi microsoft /proc/version 2>/dev/null; then exit 0; fi
          PS=/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe
          [ -x "$PS" ] || exit 0
          "$PS" -NonInteractive -ExecutionPolicy Bypass \
            -File "$(wslpath -w "$(pwd)/scripts/ci-power-keepalive.ps1")" -Stop 2>/dev/null || true
          echo "WSL2 sleep prevention stopped."

  build-windows:
    # SKY-2421: same fix as build-linux — removed job-level `if` so the job always
    # runs and produces `success`, keeping `report` unblocked on PRs. Packaging
    # steps are gated at step level instead.
    # SKY-7428: native windows-latest runner (was ubuntu-latest cross-building via
    # wine, which broke — "wine is required" — after the hosted-runner migration).
    # The windows-latest quota failure seen on PR #571 was a private-repo minutes
    # limit; the repo is now public (35507aea), so hosted Windows minutes are free
    # and native packaging is simpler and more reliable than a wine cross-build.
    needs: [setup]
    runs-on: windows-latest
    timeout-minutes: 40
    continue-on-error: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Skip — packaging only runs on push/workflow_dispatch
        if: github.event_name == 'pull_request'
        run: |
          echo "build-windows: packaging skipped on pull_request events."
          echo "Required check satisfied — packaging runs on push to main or workflow_dispatch only."

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request'

      - name: Deinit stale git submodule registrations
        run: git submodule deinit --all -f 2>/dev/null || true

      - name: Set up Node.js
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name != 'pull_request'
        run: npm ci

      - name: Build and package (Windows NSIS + ZIP)
        if: github.event_name != 'pull_request'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build:electron && npx electron-builder --win nsis zip --publish never

      - name: Upload Windows packages
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          retention-days: 3

  report:
    # Event-driven board ping. Runs after all required jobs complete on a PR.
    # The merge gate (GitHubManager routine f1bd9b01) keeps an hourly backstop
    # sweep for missed pings. PR-only — plain pushes to main get no ping.
    # Stays self-hosted deliberately: the `paperclipai` CLI it drives only exists
    # on the local runner (and no public/fork PR exposure per SKY-849). It is not
    # a required check, so a slow/offline runner never blocks merges.
    # build-linux and build-windows always run (fast no-op on PRs) so this job
    # is never blocked by upstream skipped status (SKY-2421).
    # build-electron is included so BUILD_ELECTRON_RESULT is accessible for
    # auto-fix stage detection (SKY-3006); it is already transitively needed.
    # actions: read is required for gh run list / gh run view used by the
    # repo-wide failure detection in notify-board.sh (SKY-3907).
    needs: [lint, typecheck, unit, build-electron, ci, build-macos, build-linux, build-windows]
    runs-on: self-hosted
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for scripts/notify-board.sh)
        uses: actions/checkout@v4

      - name: Notify Paperclip board of CI completion
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          BUILD_ELECTRON_RESULT: ${{ needs.build-electron.result }}
          CI_RESULT: ${{ needs.ci.result }}
          BUILD_LINUX_RESULT: ${{ needs.build-linux.result }}
          BUILD_MACOS_RESULT: ${{ needs.build-macos.result }}
          BUILD_WINDOWS_RESULT: ${{ needs.build-windows.result }}
          PAPERCLIP_COMPANY_ID: edf5c2ab-f1b1-481e-acf6-0e6ed34457b6
          PAPERCLIP_PROJECT_ID: e3bac698-f86d-4a54-94cc-d5528261d12f
          PAPERCLIP_ASSIGNEE: f424b325-3718-48da-9e33-8319c235dc8f
          PAPERCLIP_FE_AGENT_ID: b2f91d8c-36c6-4397-a5fc-a7cb61d6a64d
          PAPERCLIP_CTO_AGENT_ID: 63388835-9c91-41d0-8852-ffc1b76daaec
        run: bash scripts/notify-board.sh
