name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build production assets
        run: npm run build

      - name: Verify production start path
        run: |
          STORY_API_ACCESS_MODE=demo ANTHROPIC_API_KEY=ci PORT=3001 npm start &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3001/ | grep -q '<div id="root"></div>'
          status=$(curl -s -o /tmp/api-response.json -w '%{http_code}' http://127.0.0.1:3001/api/stories/generate)
          test "$status" = "404"
          grep -q 'API route not found' /tmp/api-response.json
