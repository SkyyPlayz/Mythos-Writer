name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Build (electron-vite)
        run: npm run build:electron

      # better-sqlite3 is built for the Node ABI by `npm ci`; the E2E launches
      # Electron, which has a different ABI. Rebuild the native module against
      # Electron so the main process can load it (otherwise the app crashes on
      # startup before creating a window and Playwright times out on firstWindow).
      # Runs after the Node-based unit tests above, which need the Node ABI build.
      # `npm rebuild` is used directly because @electron/rebuild's tree search
      # does not find better-sqlite3 (it is hoisted to the root by the workspace
      # and the root package.json has no dependencies).
      - name: Rebuild native modules for Electron (E2E)
        run: |
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          npm rebuild better-sqlite3 --runtime=electron --target="$ELECTRON_VER" --dist-url=https://electronjs.org/headers

      - name: E2E — vault CRUD (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:crud

      - name: E2E — Brainstorm Agent streaming and vault note creation (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:brainstorm

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report/

  build-macos:
    runs-on: macos-latest
    # Temporarily non-blocking: GitHub-hosted macOS runners require paid Actions minutes.
    # Will auto-pass once billing resets (June 1) or a macOS self-hosted runner is added.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Log signing status
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "APPLE_CERT_P12_BASE64 not set — building unsigned DMG (Gatekeeper warning expected)."
            echo "Signing + notarization activates automatically once MYT-642 secrets are provisioned."
          fi
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}

      - name: Build and package (macOS DMG)
        env:
          # CI always builds unsigned — signing happens in the release workflow
          # when APPLE_CERT_P12_BASE64 is provisioned (MYT-642).
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  build-linux:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Build and package (Linux AppImage)
        run: npm run dist:linux

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/*.AppImage

      - name: Smoke-test AppImage (start / stop)
        run: |
          APPIMAGE=$(ls dist-electron/*.AppImage | head -1)
          chmod +x "$APPIMAGE"
          xvfb-run --auto-servernum "$APPIMAGE" --no-sandbox &
          APP_PID=$!
          sleep 8
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "AppImage exited prematurely — smoke test FAILED"
            exit 1
          fi
          kill "$APP_PID"
          wait "$APP_PID" || true
          echo "Smoke test passed: AppImage started and stopped cleanly"
