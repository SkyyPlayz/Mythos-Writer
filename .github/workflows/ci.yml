name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Build (electron-vite)
        run: npm run build:electron

      - name: Install Xvfb (virtual display for Electron E2E)
        run: sudo apt-get install -y xvfb

      # better-sqlite3 is built for the Node ABI by `npm ci`; the E2E launches
      # Electron, which has a different ABI. Rebuild the native module against
      # Electron so the main process can load it (otherwise the app crashes on
      # startup and Playwright times out waiting for the first window). Runs
      # after the Node-based unit tests above, which need the Node ABI build.
      # --build-from-source is required: without it electron-rebuild fetches a
      # prebuilt that keeps the Node ABI, leaving the crash in place.
      - name: Rebuild native modules for Electron (E2E)
        run: |
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          npx electron-rebuild -f -v "$ELECTRON_VER" -w better-sqlite3 --build-from-source

      - name: E2E — vault CRUD (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:crud

      - name: E2E — Brainstorm Agent streaming and vault note creation (headless)
        run: xvfb-run --auto-servernum npm run test:e2e:brainstorm

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report/

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Build and package (macOS DMG)
        env:
          # Skip code signing — notarization is a later step
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint -w frontend

      - name: Type-check (frontend)
        run: npm run typecheck -w frontend

      - name: Type-check (electron-main)
        run: npm run typecheck -w electron-main

      - name: Test (electron-main)
        run: npm run test -w electron-main

      - name: Test (frontend)
        run: npm run test -w frontend

      - name: Build and package (Linux AppImage)
        run: npm run dist:linux

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/*.AppImage

      - name: Install AppImage runtime dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libfuse2 xvfb

      - name: Smoke-test AppImage (start / stop)
        run: |
          APPIMAGE=$(ls dist-electron/*.AppImage | head -1)
          chmod +x "$APPIMAGE"
          xvfb-run --auto-servernum "$APPIMAGE" --no-sandbox &
          APP_PID=$!
          sleep 8
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "AppImage exited prematurely — smoke test FAILED"
            exit 1
          fi
          kill "$APP_PID"
          wait "$APP_PID" || true
          echo "Smoke test passed: AppImage started and stopped cleanly"
