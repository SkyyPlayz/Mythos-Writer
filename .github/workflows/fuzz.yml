name: Fuzz (60s)
# Dedicated job for property-based tests + coverage-guided fuzzing (SKY-372).
# This runs on every PR in addition to the fuzz steps in ci.yml so the
# property/fuzz results are visible as a named check separate from the main CI.

on:
  pull_request:
    branches: [main]

concurrency:
  group: fuzz-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  property-tests-and-fuzz:
    runs-on: ubuntu-latest
    # Hard cap: property tests + 2×60s fuzz + setup should finish in well under 15 min.
    # Without this, a hung Jazzer process keeps the runner busy=true after disconnect,
    # producing ghost-job runners that block all CI (SKY-2288).
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run property tests (parseFrontmatter + safeVaultJoin)
        run: npx vitest run --reporter verbose property.test
        working-directory: electron-main

      - name: Build fuzz harnesses
        run: npm run fuzz:build
        working-directory: electron-main

      - name: Fuzz frontmatter parser (60s)
        # Use setsid+timeout+PID trap (same pattern as ci.yml) so Jazzer is
        # OS-killed if it overruns — prevents ghost-busy runner state (SKY-2288).
        run: |
          mkdir -p fuzz/crashes
          setsid timeout --kill-after=5s 90 npx jazzer fuzz/dist/fuzz/frontmatter.fuzz.js \
            fuzz/corpus/frontmatter --sync -- \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/frontmatter- &
          fuzz_pid=$!
          trap 'kill -TERM -- -$fuzz_pid 2>/dev/null || true; sleep 4; kill -KILL -- -$fuzz_pid 2>/dev/null || true' EXIT TERM INT
          wait "$fuzz_pid" || true
          trap - EXIT TERM INT
        working-directory: electron-main

      - name: Fuzz DOCX/EPUB inline parsers (60s)
        run: |
          mkdir -p fuzz/crashes
          setsid timeout --kill-after=5s 90 npx jazzer fuzz/dist/fuzz/docxInline.fuzz.js \
            fuzz/corpus/docxInline -- \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/docxInline- &
          fuzz_pid=$!
          trap 'kill -TERM -- -$fuzz_pid 2>/dev/null || true; sleep 4; kill -KILL -- -$fuzz_pid 2>/dev/null || true' EXIT TERM INT
          wait "$fuzz_pid" || true
          trap - EXIT TERM INT
        working-directory: electron-main

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-standalone
          path: electron-main/fuzz/crashes/
          retention-days: 30
