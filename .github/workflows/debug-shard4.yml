# TEMPORARY diagnostic — remove before merge.
# e2e-shard-4 fails in CI on this branch but passes locally; CI logs are
# unreadable from the authoring session, so this job re-runs the shard and
# commits the per-suite output back to the branch for inspection.
name: Debug Shard 4
on:
  push:
    branches:
      - claude/audit-p1-reindex-freeze
      - claude/audit-p2-db-schedulers
      - claude/audit-p4-renderer-hygiene
permissions:
  contents: write
concurrency:
  group: debug-shard4-${{ github.ref }}
  cancel-in-progress: true
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:electron
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      - name: Install Xvfb
        run: sudo apt-get update -q && sudo apt-get install -y xvfb
      - name: Run shard-4 suites, capture output
        run: |
          mkdir -p .debug-shard4
          : > .debug-shard4/report.txt
          for s in entity-mention timeline entries post-onboarding continuity-panel scene-crafter onboarding-v2 writing-assistant outline; do
            echo "================ $s ================" >> .debug-shard4/report.txt
            if xvfb-run --auto-servernum npm run "test:e2e:$s" >> .debug-shard4/report.txt 2>&1; then
              echo "RESULT $s: PASS" >> .debug-shard4/report.txt
            else
              echo "RESULT $s: FAIL" >> .debug-shard4/report.txt
            fi
            tail -c 2000000 .debug-shard4/report.txt > .debug-shard4/report.trim && mv .debug-shard4/report.trim .debug-shard4/report.txt
          done
      - name: Commit report to branch
        if: always()
        run: |
          git config user.name "shard4-debug-bot"
          git config user.email "noreply@github.com"
          git add -f .debug-shard4/report.txt
          git commit -m "debug: shard-4 diagnostic report [skip ci]" || exit 0
          git push origin HEAD:${{ github.ref_name }}
