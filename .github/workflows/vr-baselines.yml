name: VR Baselines

# Regenerates the visual-regression baselines (e2e/visual-baselines/) in the
# GitHub-hosted runner environment and uploads them as the `vr-baselines`
# artifact. Dispatch it on a branch, download the artifact, and commit the
# PNGs to that branch. Needed whenever the UI changes intentionally (e.g. the
# Liquid Neon redesign) or the CI rendering environment changes (fonts and
# viewport metrics differ between runner images, so baselines captured on one
# environment fail pixelmatch on another).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          rm -rf out/
          npm run build:electron

      - name: Install Xvfb (virtual display for Electron)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: Regenerate visual-regression baselines
        env:
          VR_UPDATE_BASELINES: '1'
        run: xvfb-run --auto-servernum npm run test:e2e:visual-regression

      - name: Upload baselines artifact
        uses: actions/upload-artifact@v4
        with:
          name: vr-baselines
          path: e2e/visual-baselines/
          retention-days: 3
