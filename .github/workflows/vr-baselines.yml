name: VR Baselines

# Regenerates the visual-regression baselines (e2e/visual-baselines/) in the
# GitHub-hosted runner environment and lands them on the branch the workflow
# ran on (also uploads them as the `vr-baselines` artifact). Needed whenever
# the UI changes intentionally (e.g. the Liquid Neon redesign) or the CI
# rendering environment changes (fonts and viewport metrics differ between
# runner images, so baselines captured on one environment fail pixelmatch on
# another).
#
# The bot commit lands via a short-lived branch + auto-merging PR rather than
# a direct push (see SKY-8214): branch protection requires 2 status checks on
# every ref update, including direct pushes, and the bot token has no
# admin/bypass rights, so `git push` straight to a protected branch is always
# rejected (GH006). Opening a PR lets `ci` and `screenshot-check` run and
# report against the bot commit; auto-merge lands it once both pass. This
# adds no exception for human-authored pushes/PRs — the same 2 checks still
# gate the merge.

on:
  workflow_dispatch:
  # Temporary bootstrap: a workflow_dispatch-only workflow can't be dispatched
  # via the API until it exists on the default branch. This path-scoped push
  # trigger registers and runs it directly from the migration branch; it only
  # fires when this file itself changes, and dies with the branch after merge.
  push:
    branches: [claude/ci-github-runners]
    paths: ['.github/workflows/vr-baselines.yml']

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          rm -rf out/
          npm run build:electron

      - name: Install Xvfb (virtual display for Electron)
        run: |
          if command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb already installed — skipping apt-get"
          else
            sudo apt-get update -q
            sudo apt-get install -y xvfb
          fi

      - name: Regenerate visual-regression baselines
        env:
          VR_UPDATE_BASELINES: '1'
        run: xvfb-run --auto-servernum npm run test:e2e:visual-regression

      - name: Upload baselines artifact
        continue-on-error: true  # storage quota may be exhausted; the commit below is the real output
        uses: actions/upload-artifact@v4
        with:
          name: vr-baselines
          path: e2e/visual-baselines/
          retention-days: 3

      - name: Commit regenerated baselines to a branch
        id: commit
        run: |
          git config user.name "vr-baselines-bot"
          git config user.email "noreply@github.com"
          git add e2e/visual-baselines/
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch="vr-baselines-update-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git commit -m "test(vr): regenerate visual baselines on hosted runner"
          git push origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open PR and enable auto-merge
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_url=$(gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "test(vr): regenerate visual baselines" \
            --body "Automated baseline refresh from the vr-baselines workflow (run ${{ github.run_id }}). Branch protection on \`${GITHUB_REF_NAME}\` requires the \`ci\` and \`screenshot-check\` checks before this auto-merges — see SKY-8214.")
          gh pr merge --auto --squash "$pr_url"
